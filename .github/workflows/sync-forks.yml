# ============================================================================
# Aluminum OS — Fork Sync Workflow
# ============================================================================
# Keeps all constitutional fork overlays in sync with their upstreams.
# Strategy: git merge only — never force-push. Every sync is an auditable
# merge commit. See docs/FORK_SYNC_STRATEGY.md for full rationale.
#
# Runs weekly (Sunday 00:00 UTC) and on manual dispatch with optional dry-run.
# ============================================================================

name: sync-forks

on:
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday at 00:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — preview changes without pushing"
        type: boolean
        default: false
      fork:
        description: "Sync a single fork (leave blank for all)"
        type: string
        default: ""

jobs:
  sync:
    name: Sync ${{ matrix.fork.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fork:
          - name: claude-plugins-official
            upstream: https://github.com/anthropics/claude-plugins-official.git
          - name: servers
            upstream: https://github.com/modelcontextprotocol/servers.git
          - name: claude-code
            upstream: https://github.com/anthropics/claude-code.git
          - name: awesome-claude-code
            upstream: https://github.com/hesreallyhim/awesome-claude-code.git
          - name: awesome-claude-plugins
            upstream: https://github.com/ComposioHQ/awesome-claude-plugins.git
          - name: claude-code-plugins-plus-skills
            upstream: https://github.com/jeremylongshore/claude-code-plugins-plus-skills.git
          - name: awesome-claude-plugins2
            upstream: https://github.com/quemsah/awesome-claude-plugins.git
          - name: cc-marketplace
            upstream: https://github.com/ananddtyagi/cc-marketplace.git
          - name: claude-code-mcp
            upstream: https://github.com/KunihiroS/claude-code-mcp.git
          - name: awesome-claude-code-plugins
            upstream: https://github.com/ccplugins/awesome-claude-code-plugins.git

    steps:
      - name: Skip if single-fork filter doesn't match
        if: ${{ github.event.inputs.fork != '' && github.event.inputs.fork != matrix.fork.name }}
        run: echo "Skipping ${{ matrix.fork.name }} — filter is '${{ github.event.inputs.fork }}'" && exit 0

      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          repository: splitmerge420/${{ matrix.fork.name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream "${{ matrix.fork.upstream }}" || true
          git remote -v

      - name: Fetch upstream
        id: fetch
        run: |
          git fetch upstream --prune || {
            echo "FETCH_FAILED=true" >> $GITHUB_OUTPUT
            echo "::warning::Could not fetch upstream for ${{ matrix.fork.name }} — skipping"
            exit 0
          }
          echo "FETCH_FAILED=false" >> $GITHUB_OUTPUT

      - name: Detect upstream default branch
        id: branch
        if: steps.fetch.outputs.FETCH_FAILED != 'true'
        run: |
          BRANCH=$(git remote show upstream 2>/dev/null | grep "HEAD branch" | awk '{print $NF}')
          if [ -z "$BRANCH" ]; then
            BRANCH="main"
          fi
          echo "UPSTREAM_BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "Upstream default branch: $BRANCH"

      - name: Check sync status
        id: status
        if: steps.fetch.outputs.FETCH_FAILED != 'true'
        run: |
          UPSTREAM_BRANCH="${{ steps.branch.outputs.UPSTREAM_BRANCH }}"
          AHEAD=$(git rev-list --count upstream/$UPSTREAM_BRANCH..HEAD 2>/dev/null || echo "0")
          BEHIND=$(git rev-list --count HEAD..upstream/$UPSTREAM_BRANCH 2>/dev/null || echo "0")
          echo "AHEAD=$AHEAD" >> $GITHUB_OUTPUT
          echo "BEHIND=$BEHIND" >> $GITHUB_OUTPUT
          echo "${{ matrix.fork.name }}: ahead=$AHEAD behind=$BEHIND"

      - name: Merge upstream (dry run)
        if: |
          steps.fetch.outputs.FETCH_FAILED != 'true' &&
          steps.status.outputs.BEHIND != '0' &&
          github.event.inputs.dry_run == 'true'
        run: |
          echo "DRY RUN: Would merge upstream/${{ steps.branch.outputs.UPSTREAM_BRANCH }} into HEAD"
          echo "Commits behind: ${{ steps.status.outputs.BEHIND }}"
          git log --oneline HEAD..upstream/${{ steps.branch.outputs.UPSTREAM_BRANCH }} | head -20

      - name: Merge upstream
        id: merge
        if: |
          steps.fetch.outputs.FETCH_FAILED != 'true' &&
          steps.status.outputs.BEHIND != '0' &&
          github.event.inputs.dry_run != 'true'
        run: |
          UPSTREAM_BRANCH="${{ steps.branch.outputs.UPSTREAM_BRANCH }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git merge upstream/$UPSTREAM_BRANCH \
            --no-edit \
            --strategy-option=ours \
            -m "chore: sync upstream ${{ matrix.fork.name }} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)

          kintsugi: constitutional overlay preserved — merged upstream/$UPSTREAM_BRANCH
          upstream: ${{ matrix.fork.upstream }}
          fork: splitmerge420/${{ matrix.fork.name }}
          goldentrace: sync-$(date -u +%Y%m%dT%H%M%SZ)"; then
            echo "MERGE_RESULT=merged" >> $GITHUB_OUTPUT
          else
            echo "MERGE_RESULT=conflict" >> $GITHUB_OUTPUT
            echo "::warning::SYNC_CONFLICT detected in ${{ matrix.fork.name }} — aborting merge cleanly"
            git merge --abort 2>/dev/null || true
          fi

      - name: Push synced fork
        if: |
          steps.fetch.outputs.FETCH_FAILED != 'true' &&
          steps.merge.outputs.MERGE_RESULT == 'merged' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git push origin HEAD

      - name: Emit GoldenTrace audit entry
        if: steps.fetch.outputs.FETCH_FAILED != 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RESULT="skipped"
          if [ "${{ steps.status.outputs.BEHIND }}" = "0" ]; then
            RESULT="up_to_date"
          elif [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            RESULT="dry_run"
          elif [ "${{ steps.merge.outputs.MERGE_RESULT }}" = "merged" ]; then
            RESULT="merged"
          elif [ "${{ steps.merge.outputs.MERGE_RESULT }}" = "conflict" ]; then
            RESULT="conflict"
          fi

          cat > goldentrace-${{ matrix.fork.name }}.json << EOF
          {
            "schema": "goldentrace/v1",
            "event": "fork_sync",
            "timestamp": "$TIMESTAMP",
            "fork": "splitmerge420/${{ matrix.fork.name }}",
            "upstream": "${{ matrix.fork.upstream }}",
            "upstream_branch": "${{ steps.branch.outputs.UPSTREAM_BRANCH }}",
            "commits_ahead": ${{ steps.status.outputs.AHEAD || 0 }},
            "commits_behind": ${{ steps.status.outputs.BEHIND || 0 }},
            "result": "$RESULT",
            "dry_run": ${{ github.event.inputs.dry_run == 'true' && 'true' || 'false' }},
            "workflow_run_id": "${{ github.run_id }}"
          }
          EOF

          cat goldentrace-${{ matrix.fork.name }}.json

      - name: Upload GoldenTrace artifact
        if: steps.fetch.outputs.FETCH_FAILED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: goldentrace-${{ matrix.fork.name }}-${{ github.run_id }}
          path: goldentrace-${{ matrix.fork.name }}.json
          retention-days: 90

  summary:
    name: Sync Summary
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    steps:
      - name: Download all GoldenTrace artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: goldentrace-*
          merge-multiple: true

      - name: Generate workflow summary
        run: |
          echo "## Fork Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Fork | Result | Ahead | Behind |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          for f in goldentrace-*.json; do
            [ -f "$f" ] || continue
            FORK=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d['fork'].split('/')[-1])")
            RESULT=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d['result'])")
            AHEAD=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d['commits_ahead'])")
            BEHIND=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d['commits_behind'])")
            case "$RESULT" in
              merged)    ICON="✅" ;;
              up_to_date) ICON="⏩" ;;
              dry_run)   ICON="🔍" ;;
              conflict)  ICON="⚠️" ;;
              *)         ICON="❌" ;;
            esac
            echo "| $FORK | $ICON $RESULT | $AHEAD | $BEHIND |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Generated at $(date -u +"%Y-%m-%d %H:%M UTC") — GoldenTrace artifacts retained 90 days_" >> $GITHUB_STEP_SUMMARY
