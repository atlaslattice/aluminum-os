name: element145-ci

on:
  push:
    branches: ["element145-copilot-phase1-reconcile"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r services/element-145/requirements.txt

      - name: Run tests
        run: |
          pytest services/element-145/tests
