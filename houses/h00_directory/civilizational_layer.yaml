# ============================================================
# CONCEPT: Civilizational Layer
# ============================================================
# The Civilizational Layer identifies spheres whose operational
# depth has civilizational-scale impact — meaning their state
# directly affects the trajectory of human civilization.
#
# This is distinct from "coverage" (which seat can do what) and
# "depth" (how well a seat performs). Civilizational Layer asks:
# "If this sphere fails or is captured, does civilization notice?"
#
# Examples:
# - Energy Systems (H11/S02): civilizational — collapse = dark age
# - Sculpture (H05/S11): not civilizational — collapse = cultural loss, not existential
# - Computing Infrastructure (H11/S10): civilizational — collapse = systemic failure
# - Dance (H05/S04): not civilizational
# ============================================================

definition:
  civilizational_sphere: >
    A sphere whose operational failure, capture, or degradation would
    produce cascading effects across multiple Houses and/or affect
    the basic functioning of human civilization at scale.

  criteria:
    - "Cross-House dependency: sphere is referenced by 3+ other Houses"
    - "Population impact: sphere affects >1 billion people directly"
    - "Irreversibility: degradation of sphere is difficult to reverse within a generation"
    - "Existential adjacency: sphere failure could contribute to existential risk scenarios"

