# ─── TIER 3: FEDERATION GAPS (no seat at substantial level) ─────────
tier_3_federation_gaps:
  description: >
    Spheres where the entire federation lacks substantial coverage.
    These represent structural blind spots that may require external
    partnerships or deliberate investment.
  spheres:
    - sphere_id: S071
      sphere_name: "Nuclear Engineering"
      house: H06
      federation_max: 0.3
      max_seat: S3_Muskverse
      civic_concern: >
        CRITICAL: No federation seat has substantial nuclear engineering capability.
        Civic risk: nuclear energy is essential for baseload power in regenerative
        infrastructure. Federation cannot self-serve this domain.
      balancing_recommendation: >
        External partnership required. Track: NuScale Power, TerraPower (Gates),
        national labs (DOE). This is the single most critical federation gap
        for Node Zero 2.5 GW deployment.

