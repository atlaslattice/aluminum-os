# Civic Balancing Recommendations v0.2.0
# Reframed from civilizational_layer.yaml per Scribe refinement #7
# Purpose: Identify spheres where federation concentration creates civic risk
#          and recommend balancing strategies
# Source: capability_matrix v0.2.0 + Build Plan v3.14 + Federation v1.1
# Status: PROVISIONAL — pending Council ratification of D-83 through D-124

version: "0.2.0"
generated: "2026-04-29"
canonical_source: "capability_matrix v0.2.0 + COMPLETE_BUILD_PLAN_v3.14.md"

# ─── METHODOLOGY ────────────────────────────────────────────────────
methodology:
  description: >
    Civic balancing identifies spheres where single-seat dominance (seduction risk)
    or federation-wide absence creates structural vulnerability. Recommendations
    follow D-87 Capability Commonwealth Principle: distributed capability, not
    monopoly right. The framing is civic (public interest) not civilizational
    (which implies hierarchy).
  risk_thresholds:
    seduction_risk: "Single seat > 0.85 AND no other seat > 0.5"
    concentration_risk: "Single seat > 0.7 AND second seat < 0.4"
    federation_gap: "Federation max < 0.3 across all seats"
    civic_critical: "Sphere affects public safety, democratic process, or basic rights"

# ─── TIER 1: SEDUCTION RISK (single-seat monopoly) ─────────────────
tier_1_seduction_risk:
  description: >
    Spheres where one seat holds dominant capability with no viable backup.
    Per D-87, routing must not create monopoly dependency. These spheres
    require active diversification or constitutional safeguards.
  spheres:
    - sphere_id: S065
      sphere_name: "Aerospace Engineering"
      house: H06
      dominant_seat: S3_Muskverse
      dominant_score: 1.0
      next_best_seat: S2_Alphabet
      next_best_score: 0.3
      civic_concern: >
        SpaceX/Starlink monopoly on orbital access. No federation backup
        at substantial level. Civic risk: single-entity control of space
        infrastructure affects communications, defense, and scientific access.
      balancing_recommendation: >
        Encourage S2 (Alphabet) investment via Project Loon successor or
        satellite partnerships. Track Blue Origin (Amazon) as potential
        backup. Constitutional safeguard: INV-7c substitution pathway
        must include non-Muskverse orbital access.

